services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "${DB_PORT}:5432"

  # --- Redis ---
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  # --- Mailpit ---
  mailpit:
    image: axllent/mailpit:v1.24
    ports:
      - "127.0.0.1:${MAIL_PORT:-1025}:1025"
      - "127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025"

volumes:
  postgres_data: